<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h3><i class="bi bi-gear"></i> Lab Configuration</h3>
            <form method="POST" enctype="multipart/form-data" class="row g-3 mt-3">
                <div class="col-md-6">
                    <label class="form-label">Hospital/Lab Name</label>
                    <input type="text" name="hospital_name" class="form-control" value="{{ settings.hospital_name }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Print Watermark Text</label>
                    <input type="text" name="watermark_text" class="form-control" value="{{ settings.watermark_text }}">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Upload Logo</label>
                    <input type="file" name="logo" class="form-control">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                    <a href="/" class="btn btn-secondary">Back Home</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
