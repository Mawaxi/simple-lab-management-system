<!DOCTYPE html>
<html>
<head>
    <title>Lab Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Laboratory Management System</h2>
    <a href="{{ url_for('add_patient') }}" class="btn btn-primary mb-3">Add New Patient Result</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Test</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for p in patients %}
            <tr>
                <td>{{ p.name }}</td>
                <td>{{ p.test_name }}</td>
                <td>{{ p.date }}</td>
                <td><a href="{{ url_for('view_patient', id=p.id) }}" class="btn btn-sm btn-info">Print Result</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
