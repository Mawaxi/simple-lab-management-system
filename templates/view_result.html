<!DOCTYPE html>
<html>
<head>
    <title>Print Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="container mt-5">
    <div class="card p-4" id="printableArea">
        <h2 class="text-center">HEALTH LABORATORY RESULT</h2>
        <hr>
        <p><strong>Patient Name:</strong> {{ patient.name }}</p>
        <p><strong>Age/Gender:</strong> {{ patient.age }} / {{ patient.gender }}</p>
        <p><strong>Phone:</strong> {{ patient.phone }}</p>
        <p><strong>Date:</strong> {{ patient.date }}</p>
        <hr>
        <h4>Test: {{ patient.test_name }}</h4>
        <p style="font-size: 1.2em;"><strong>Result:</strong><br>{{ patient.result }}</p>
        <br><br>
        <p class="text-end"><em>Authorized Signature: _________________</em></p>
    </div>
    <div class="mt-4 no-print">
        <button onclick="window.print()" class="btn btn-primary">Print Now</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</body>
</html>
