<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Enter Patient Data & Result</h2>
    <form method="POST">
        <div class="mb-3"><label>Full Name</label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label>Age</label><input type="number" name="age" class="form-control"></div>
        <div class="mb-3"><label>Gender</label><select name="gender" class="form-control"><option>Male</option><option>Female</option></select></div>
        <div class="mb-3"><label>Phone</label><input type="text" name="phone" class="form-control"></div>
        <div class="mb-3"><label>Test Name</label><input type="text" name="test_name" class="form-control" required></div>
        <div class="mb-3"><label>Result</label><textarea name="result" class="form-control" required></textarea></div>
        <div class="mb-3"><label>Date</label><input type="date" name="date" class="form-control" required></div>
        <button type="submit" class="btn btn-success">Save Result</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>
    </form>
</body>
</html>
